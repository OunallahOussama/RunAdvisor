name: Deploy (EC2)

# Deploys the current `main` to the configured EC2 box by SSH-ing in and
# running ./scripts/deploy.sh (which pulls origin/main, rebuilds the stack,
# and runs health probes).
#
# Required repository secrets:
#   EC2_HOST     DNS or IP of the EC2 instance (e.g. runadvisor.example.com)
#   EC2_USER     SSH user (ubuntu for Ubuntu 24.04, ec2-user for AL2023)
#   EC2_SSH_KEY  Contents of a private SSH key whose public half is in
#                ~$EC2_USER/.ssh/authorized_keys on the box. Generate a
#                dedicated deploy key — do NOT reuse a personal key.
# Optional repository variable:
#   EC2_REPO_DIR Path to the checkout on the box (default: ~/RunAdvisor)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Trust EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        env:
          REPO_DIR: ${{ vars.EC2_REPO_DIR || '~/RunAdvisor' }}
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd ${REPO_DIR} && ./scripts/deploy.sh"
