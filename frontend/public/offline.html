<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#08111f" />
    <title>RunAdvisor Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(249, 115, 22, 0.16), transparent 28%),
          linear-gradient(180deg, #0f172a, #08111f);
        color: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        max-width: 420px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.82);
        padding: 28px;
        box-shadow: 0 24px 48px -28px rgba(2, 6, 23, 0.62);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 24px;
        font-weight: 700;
      }

      .brand-badge {
        width: 42px;
        height: 42px;
        border-radius: 16px;
        overflow: hidden;
      }

      p {
        line-height: 1.65;
        color: #cbd5e1;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        margin-top: 12px;
        border-radius: 999px;
        background: rgba(251, 146, 60, 0.14);
        border: 1px solid rgba(249, 115, 22, 0.24);
        color: #fb923c;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <img class="brand-badge" src="/icon-192.svg" alt="" />
        <span>RunAdvisor</span>
      </div>
      <h1>You're offline.</h1>
      <p>
        The app shell is still available, and pages that were saved locally can continue working.
        Reconnect to sync Strava, refresh coach review, and fetch new training data.
      </p>
      <div class="pill">Offline-ready mobile workspace</div>
    </div>
  </body>
</html>
