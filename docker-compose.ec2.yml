services:
  mongodb:
    image: mongo:7.0
    container_name: runadvisor-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-runadvisor}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - runadvisor-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: runadvisor-backend
    restart: unless-stopped
    env_file:
      - .env.ec2
    environment:
      NODE_ENV: production
      PORT: 5000
      TRUST_PROXY: ${TRUST_PROXY:-1}
      MONGODB_URI: ${MONGODB_URI}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI}
      STRAVA_TOKEN_ENCRYPTION_KEY: ${STRAVA_TOKEN_ENCRYPTION_KEY:-}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:-}
      STRAVA_WEBHOOK_SIGNING_SECRET: ${STRAVA_WEBHOOK_SIGNING_SECRET:-}
      STRAVA_WEBHOOK_SKIP_SIGNATURE: ${STRAVA_WEBHOOK_SKIP_SIGNATURE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ADMIN_AUTH0_IDS: ${ADMIN_AUTH0_IDS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-}
      USAGE_EVENT_TTL_DAYS: ${USAGE_EVENT_TTL_DAYS:-90}
    depends_on:
      mongodb:
        condition: service_healthy
    # Bind API only on localhost for host Nginx (must match proxy_pass in nginx)
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - runadvisor-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL}
        REACT_APP_AUTH0_DOMAIN: ${AUTH0_DOMAIN}
        REACT_APP_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
        REACT_APP_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
        REACT_APP_AUTH0_CALLBACK_URL: ${REACT_APP_AUTH0_CALLBACK_URL}
        REACT_APP_STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
        REACT_APP_STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI}
    container_name: runadvisor-frontend
    restart: unless-stopped
    depends_on:
      backend:
        # Frontend is static and can start even if backend healthcheck is delayed.
        condition: service_started
    ports:
      - "8080:3000"
    networks:
      - runadvisor-network

volumes:
  mongodb-data:

networks:
  runadvisor-network:
    driver: bridge
